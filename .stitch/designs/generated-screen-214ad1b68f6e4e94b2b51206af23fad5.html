<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Outfits Screen - Inspo App</title>
<!-- Tailwind CSS CDN with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts for typography -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;family=Inter:wght@400;500;600&amp;family=Caveat:wght@400;700&amp;display=swap" rel="stylesheet"/>
<style data-purpose="custom-fonts">
    .font-serif-title { font-family: 'Playfair+Display', serif; }
    .font-sans-ui { font-family: 'Inter', sans-serif; }
    .font-handwriting { font-family: 'Caveat', cursive; }
  </style>
<style data-purpose="layout-styling">
    body {
      background-color: #f5f1e8; /* Warm beige background */
      background-image: radial-gradient(#d1cfc7 1px, transparent 1px);
      background-size: 24px 24px; /* Subtle dot grid */
      min-height: 100vh;
      overflow-x: hidden;
    }

    .polaroid-card {
      background: white;
      padding: 12px 12px 40px 12px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s ease;
    }

    /* Rotation and stacking for the collage effect */
    .card-1 { transform: rotate(-4deg); z-index: 10; }
    .card-2 { transform: rotate(3deg); z-index: 5; }

    .bottom-nav-glass {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body class="font-sans-ui text-gray-900">
<!-- BEGIN: MainHeader -->
<header class="p-6 flex justify-between items-center bg-transparent relative z-50">
<h1 class="text-4xl font-serif-title font-bold">Outfits</h1>
<div class="flex items-center gap-3">
<button class="bg-white px-5 py-2.5 rounded-full text-sm font-semibold shadow-sm border border-gray-100 flex items-center gap-2">
        Upload outfit
      </button>
<button class="w-10 h-10 flex items-center justify-center bg-white rounded-full shadow-sm border border-gray-100">
<svg fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><line x1="4" x2="4" y1="21" y2="14"></line><line x1="4" x2="4" y1="10" y2="3"></line><line x1="12" x2="12" y1="21" y2="12"></line><line x1="12" x2="12" y1="8" y2="3"></line><line x1="20" x2="20" y1="21" y2="16"></line><line x1="20" x2="20" y1="12" y2="3"></line><line x1="1" x2="7" y1="14" y2="14"></line><line x1="9" x2="15" y1="8" y2="8"></line><line x1="17" x2="23" y1="16" y2="16"></line></svg>
</button>
</div>
</header>
<!-- END: MainHeader -->
<!-- BEGIN: HeroCollageSection -->
<main class="relative px-6 pt-10 pb-32">
<!-- Handwriting Overlay Text -->
<div class="absolute top-4 left-0 w-full text-center z-30 pointer-events-none">
<p class="font-handwriting text-3xl md:text-4xl text-gray-800 leading-tight">
        Scroll for your perfect<br/>fit and inspiration
      </p>
</div>
<!-- Polaroid Cards Collage Container -->
<div class="relative mt-12 flex flex-col items-center">
<!-- Card 1: Person Wearing Outfit -->
<div class="polaroid-card card-1 w-64 h-80 relative">
<div class="w-full h-full bg-gray-200 overflow-hidden">
<img alt="Woman in a denim dress" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB6dU0QOXafJtrETZqlITHww7E2r_7oOlfJJD1OauyrgmFSeJnf-Y-k5KiWk1ts75lil5L02FD649GKWKeZ-L5YvVLgyhbtYuMTUd3jYtHaLhYo91xmGVZgcDEKPtIwAbP063ef2B5K1gTCbG_czR9ZbNyFWjdXQ-gu0ygCZXb3b8cJV6GNj-6-wUW9kMP9EAg2m5DLiDeJgIW07ZqDbG270-XehM-TgZw73nxuSeaQwlT4Hi3R1DAxxwvGU_8E20ecXKJOdM4wCL0"/>
</div>
<div class="absolute bottom-3 left-1/2 -translate-x-1/2 text-xs text-gray-400">#DenimVibes</div>
</div>
<!-- Card 2: Flat Lay Outfit -->
<div class="polaroid-card card-2 w-64 h-80 absolute top-20 right-4 sm:right-1/4">
<div class="w-full h-full bg-gray-200 overflow-hidden">
<img alt="Flat lay of denim dress, sneakers, bag, and sunglasses" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCNyLS7DpYBuPJbnYuxhdh9sNjFkbo6KdvNlzG8RJA_wjmaLIDCcKXnYakgXGndaT5RDfSBnqEZ7qas2KEveN_H_AdgK_BBUq6TqX9Vn8FRxO02wu-mVBXv_nDt7bbDags4oRMdxtBnvdCLOXqCs-XRPqcf4k6Eh0OWT7qjbjTpzDYo3mScEusz6rV9Nwfv16LTNNSrk-34Yviicu-OEQpaL4J2JqGlHngLGBtQwVYMckNFjE8BbOMqRSDSb6lTNeB0YuS0enytoPM"/>
</div>
<div class="absolute bottom-3 left-1/2 -translate-x-1/2 text-xs text-gray-400">The Essentials</div>
</div>
</div>
<!-- Additional Content Area to allow scrolling -->
<section class="mt-80 pt-20">
<h2 class="text-xl font-bold mb-6">Recently Styled</h2>
<div class="grid grid-cols-2 gap-4">
<div class="aspect-[3/4] rounded-2xl bg-gray-300 overflow-hidden">
<img alt="Recent outfit" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA7p3s6O-Rw_N3fXXN4NHzhu6ufPxrqAEZlMOdJ_-Zrj7VXsqksXWmTnU5StceqeUNKVLUj-dDDS9ppmiMHtJYjW7_J5S7RQyNy1PHZ7oe4FCESnHugUmn946ljzxeLhx7sGiWRhyb88vK_DZWeSJzkSYSvCn0Ue9vHn2fdyXxaa7unkAj-w8tj_QzGDtckpnE-RRzDZVvDI8u3xz_dDLONUDEU3tVZW2jro1QEBQ65BCeBnUfHycFFCZPqPoc65v9WvHnfuOTQsQY"/>
</div>
<div class="aspect-[3/4] rounded-2xl bg-gray-300 overflow-hidden">
<img alt="Recent outfit" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuChSXuk-D4uarvSY2aaDGZJRpFmvuDUWu6xgEw_ACstshPQ-WuOSqrgMKA_4aE5JUz00YMqFLIh6aupgfn4sbkLJOuZ0ed0oVcgduwvMkploxoGSx9uHrVxHP3GFaIhYCMy5_IdbI3twFV9toE3v7rARmKXXZZngd0uLp4MLAZ7bPMjO8BVgjyFkq7NTKd4VA_eNh03lTdGwbnzAg4XqAFLPZf3gPaOPdaWHjOaG6yn9J_R2Pre0ftmmiUR2GJel3jtFlZ8IS_-V0s"/>
</div>
</div>
</section>
</main>
<!-- END: HeroCollageSection -->
<!-- BEGIN: BottomNavigation -->
<nav class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[100] w-[90%] max-w-sm">
<div class="bottom-nav-glass rounded-[32px] p-2 flex items-center justify-between shadow-xl">
<!-- Inspo Tab -->
<a class="flex flex-col items-center justify-center py-2 px-4 rounded-full transition-colors hover:bg-white/50" href="#">
<svg class="text-gray-500" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><rect height="7" width="7" x="3" y="3"></rect><rect height="7" width="7" x="14" y="3"></rect><rect height="7" width="7" x="14" y="14"></rect><rect height="7" width="7" x="3" y="14"></rect></svg>
<span class="text-[10px] font-bold text-gray-500 uppercase mt-1">Inspo</span>
</a>
<!-- Outfits Tab (Active) -->
<a class="flex flex-col items-center justify-center py-2 px-6 rounded-full bg-black text-white shadow-lg" href="#">
<svg fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M20.38 3.46L16 2a4 4 0 01-8 0L3.62 3.46a2 2 0 00-1.62 1.96V10a8 8 0 0016 0V5.42a2 2 0 00-1.62-1.96z"></path><path d="M12 22v-8"></path></svg>
<span class="text-[10px] font-bold uppercase mt-1">Outfits</span>
</a>
<!-- Wardrobe Tab -->
<a class="flex flex-col items-center justify-center py-2 px-4 rounded-full transition-colors hover:bg-white/50" href="#">
<svg class="text-gray-500" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
<span class="text-[10px] font-bold text-gray-500 uppercase mt-1">Wardrobe</span>
</a>
<!-- Profile Tab -->
<a class="flex flex-col items-center justify-center py-2 px-4 rounded-full transition-colors hover:bg-white/50" href="#">
<svg class="text-gray-500" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="10" r="3"></circle><path d="M7 20.662V19a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v1.662"></path></svg>
<span class="text-[10px] font-bold text-gray-500 uppercase mt-1">Profile</span>
</a>
</div>
</nav>
<!-- END: BottomNavigation -->
<!-- BEGIN: ChatFloatingButton -->
<button class="fixed bottom-28 right-6 w-14 h-14 bg-white rounded-full flex items-center justify-center shadow-2xl border border-gray-100 z-[90]">
<svg class="text-black" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
</button>
<!-- END: ChatFloatingButton -->
</body></html>
