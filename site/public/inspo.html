<!DOCTYPE html>

<html class="h-full" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Inspo - Fashion Try-on App</title>
<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Serif for Headings, Sans for UI -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<style data-purpose="typography">
    h1, h2, .serif {
      font-family: 'Playfair Display', serif;
    }
    body, .sans {
      font-family: 'Inter', sans-serif;
    }
  </style>
<style data-purpose="custom-layout">
    /* Glassmorphism Effect for Buttons and Nav */
    .glass-effect {
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    
    /* Custom Scrollbar Hide */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Mannequin Silhouette Centering */
    .mannequin-container {
      height: 35vh;
      display: flex;
      justify-content: center;
      align-items: flex-end;
    }
  </style>
</head>

<!-- BEGIN: Top Navigation Bar -->
<header class="px-6 pt-12 pb-4 flex justify-between items-center bg-[#F2F0E9] z-10" data-purpose="app-header">

<button class="bg-white px-5 py-2.5 rounded-full text-sm font-medium shadow-sm border border-stone-200 transition-active active:scale-95">
