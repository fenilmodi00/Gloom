<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Upload Outfit</title>
<!-- Tailwind CSS v3 CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Source Serif 4 & Manrope -->
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600&amp;family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&amp;display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              DEFAULT: '#D0BB95',
              light: '#f5f1e8',
            },
            surface: '#FCF9F5',
          },
          fontFamily: {
            serif: ['"Source Serif 4"', 'serif'],
            sans: ['Manrope', 'sans-serif'],
          },
          borderRadius: {
            'custom': '12px',
          }
        }
      }
    }
  </script>
<style data-purpose="typography">
    body {
      font-family: 'Manrope', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    h1, h2, .font-serif {
      font-family: 'Source Serif 4', serif;
    }
  </style>
<style data-purpose="layout-tweaks">
    .safe-area-top {
      padding-top: env(safe-area-inset-top);
    }
    .safe-area-bottom {
      padding-bottom: env(safe-area-inset-bottom);
    }
    .button-shadow {
      box-shadow: 0 4px 14px 0 rgba(208, 187, 149, 0.3);
    }
  </style>
</head>
<body class="bg-surface text-stone-800 min-h-screen flex flex-col">
<!-- BEGIN: Navigation Header -->
<header class="safe-area-top px-6 py-4 flex items-center justify-between" data-purpose="app-header">
<button aria-label="Go back" class="p-2 -ml-2 rounded-full hover:bg-stone-100 transition-colors">
<!-- Simple Back Arrow Icon -->
<svg fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
<path d="m15 18-6-6 6-6"></path>
</svg>
</button>
</header>
<!-- END: Navigation Header -->
<!-- BEGIN: Main Content -->
<main class="flex-1 flex flex-col items-center justify-center px-8 text-center">
<!-- BEGIN: Illustration Section -->
<div class="mb-10 w-full max-w-xs mx-auto bg-white p-4 rounded-2xl shadow-sm" data-purpose="hero-illustration">
<!-- High-quality, realistic dress photo on plain white background -->
<img alt="Realistic dress flat-lay" class="w-full h-auto aspect-[3/4] object-cover rounded-lg" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCntNMmQrV6asMf5PXZpXwLe7-Pffefdn-HlUWmYjH1ulyYyA0UsskZECPIVjy4faEhjUn0VFO_fkvpbvZJlS8H722Xwz3-M6ehRDHWTrtJK48MV3wnfsjjX7Se3Ot9HMxsQOtposifk_StGE9mL0-jxk6DNdfcGBGW51b4fK4F6rJbDQK2OfkoC21foZ5-Pcn42kO53kuYL62HdEcNyGEdq_3f6OZHnKHcxvGJ90huyXrIX1W6mXEaw8rzqoLxPwPJWHWexm2Pkdw"/>
</div>
<!-- END: Illustration Section -->
<!-- BEGIN: Text Content -->
<section class="mb-10" data-purpose="heading-section">
<h1 class="text-3xl font-semibold mb-3">Add to your Wardrobe</h1>
<p class="text-stone-500 max-w-xs mx-auto">
        Snap a photo or choose from your library to start styling your next look.
      </p>
</section>
<!-- END: Text Content -->
<!-- BEGIN: Action Buttons -->
<div class="w-full space-y-4 max-w-sm mb-8" data-purpose="upload-actions">
<!-- Capture Button -->
<button class="w-full flex items-center justify-center gap-3 bg-brand text-stone-900 font-semibold py-4 px-8 rounded-full button-shadow hover:opacity-90 active:scale-95 transition-all">
<svg fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg">
<path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"></path>
<circle cx="12" cy="13" r="3"></circle>
</svg>
<span>Capture</span>
</button>
<!-- Gallery Upload Button -->
<button class="w-full flex items-center justify-center gap-3 bg-white border border-stone-200 text-stone-800 font-semibold py-4 px-8 rounded-full shadow-sm hover:bg-stone-50 active:scale-95 transition-all">
<svg fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg">
<rect height="18" rx="2" ry="2" width="18" x="3" y="3"></rect>
<circle cx="9" cy="9" r="2"></circle>
<path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"></path>
</svg>
<span>Upload from Gallery</span>
</button>
</div>
<!-- END: Action Buttons -->
</main>
<!-- END: Main Content -->
<!-- Spacer for bottom safe area -->
<div class="safe-area-bottom h-8"></div>
</body></html>
